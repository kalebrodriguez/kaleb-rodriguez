<!doctype html>
<html lang="en">

        text-transform: uppercase;
      }
      h1 {

      a {
        display: inline-block;
        margin-top: 1.75rem;
        background: #38d6c4;
        color: #0a0e17;
        text-decoration: none;

        padding: 0.75rem 1.5rem;
        border-radius: 6px;
      }

  <body>
    <main>
      <div class="code">Error 404 — signal lost</div>
